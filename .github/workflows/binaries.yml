name: Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build binaries for (e.g. vaultspec-core-v0.1.48)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: binaries-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: [self-hosted, Linux, X64, build]
            target: x86_64-unknown-linux-gnu
          - name: windows-x86_64
            runner: [self-hosted, Windows, X64]
            target: x86_64-pc-windows-msvc
          - name: macos-aarch64
            runner: [self-hosted, macOS, ARM64]
            target: aarch64-apple-darwin
          # No self-hosted macOS x86_64 host exists; PyApp cross-builds it on
          # the Apple Silicon runner (the CPython distribution is selected from
          # the cargo target triple, and clang links both arches natively).
          - name: macos-x86_64
            runner: [self-hosted, macOS, ARM64]
            target: x86_64-apple-darwin
    # Artifact builds run on the shared self-hosted fleet (hosted multiplatform
    # runners are cost-prohibitive); see publish.yml for the same constraint.
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Build binaries
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          uv run --no-project --python 3.13 -- \
            python scripts/build_pyapp.py --tag "${TAG}" --target "${TARGET}" --outdir dist-bin

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.name }}
          path: dist-bin/
          if-no-files-found: error
          retention-days: 5

  release:
    name: Attach to release
    needs: build
    runs-on: [self-hosted, Linux, X64, build]
    permissions:
      contents: write
    steps:
      # Check out main so the scoop-bump step can rewrite and commit the
      # in-repo bucket manifest after the assets are attached. The SSH deploy
      # key authenticates the manifest push: main is protected by a ruleset
      # that requires status checks, and a deploy-key push is a bypass actor,
      # so the automated bump lands without a human-gated PR while every other
      # push stays gated.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          ssh-key: ${{ secrets.SCOOP_DEPLOY_KEY }}

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: dist-bin/
          merge-multiple: true

      - name: Aggregate checksums
        shell: bash
        run: |
          cd dist-bin
          # Per-asset .sha256 files are produced by build_pyapp.py; fold them
          # into one sha256sum-compatible manifest and drop the fragments.
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          {
            echo "### Binary checksums"
            echo '```'
            cat SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: gh release upload "${TAG}" dist-bin/* --clobber

      # Bump the committed scoop manifest to the released version, reading the
      # Windows hashes straight from the SHA256SUMS just built (scoop's
      # checkver/autoupdate stanzas only serve maintainer tooling; `scoop
      # install` reads the committed url/hash). Mirrors the dashboard repo's
      # scoop-bump idiom, including the backward-bump guard.
      - name: Bump scoop manifest
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          MANIFEST="bucket/vaultspec-core.json"
          VERSION="${TAG#vaultspec-core-v}"
          CORE_ASSET="vaultspec-core-x86_64-pc-windows-msvc.exe"
          MCP_ASSET="vaultspec-mcp-x86_64-pc-windows-msvc.exe"
          H_CORE=$(awk -v a="$CORE_ASSET" '$2==a{print $1}' dist-bin/SHA256SUMS)
          H_MCP=$(awk -v a="$MCP_ASSET" '$2==a{print $1}' dist-bin/SHA256SUMS)
          test -n "$VERSION" && test -n "$H_CORE" && test -n "$H_MCP"
          # Refuse to bump the manifest to a version older than what is already
          # committed (guards against a stale re-run clobbering a newer bump).
          CURRENT=$(jq -r '.version' "$MANIFEST")
          if [ "$CURRENT" != "0.0.0" ] && [ "$CURRENT" != "$VERSION" ] && \
             [ "$(printf '%s\n' "$CURRENT" "$VERSION" | sort -V | tail -1)" = "$CURRENT" ]; then
            echo "manifest is at ${CURRENT}, refusing to bump backward to ${VERSION}"
            exit 1
          fi
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          jq \
            --arg v "$VERSION" \
            --arg uc "${BASE}/${CORE_ASSET}" \
            --arg um "${BASE}/${MCP_ASSET}" \
            --arg hc "$H_CORE" \
            --arg hm "$H_MCP" \
            '.version = $v | .url = [$uc, $um] | .hash = [$hc, $hm]' \
            "$MANIFEST" > "${MANIFEST}.tmp"
          mv "${MANIFEST}.tmp" "$MANIFEST"
          if git diff --quiet -- "$MANIFEST"; then
            echo "manifest already at ${VERSION}; nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          git commit -m "chore(scoop): bump manifest to ${TAG}"
          # This job runs after a long matrix build, so main may have advanced
          # meanwhile. Rebase-and-retry (bounded) so an unrelated commit does not
          # fail the push non-fast-forward; the backward-bump guard above still
          # protects against clobbering a newer manifest.
          attempt=1
          max_attempts=3
          until git push origin main; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::scoop manifest push failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "push rejected (attempt ${attempt}/${max_attempts}); rebasing onto origin/main"
            git fetch origin main
            git rebase origin/main
            attempt=$((attempt + 1))
          done

name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. vaultspec-core-v0.1.3)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    name: Build
    # Artifact builds run on the shared self-hosted fleet (hosted
    # multiplatform runners are cost-prohibitive); lint/test CI stays hosted.
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Verify bundled builtins present
        run: |
          if [ ! -d "src/vaultspec_core/builtins/templates" ]; then
            echo "::error::src/vaultspec_core/builtins/ is missing canonical content - wheel build will fail"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 5

  smoke-test:
    name: Smoke Test
    needs: build
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_check.py

      - name: Smoke test (sdist)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_check.py

  publish-pypi:
    name: Publish to PyPI
    needs: smoke-test
    # OIDC trusted publishing works from self-hosted runners: the id-token
    # comes from GitHub's OIDC provider, not from the runner host.
    runs-on: [self-hosted, Linux, X64]
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish --check-url https://pypi.org/simple/ dist/*

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"
  FORCE_COLOR: "0"

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.11

  lint-and-type:
    name: Lint, Type, Config, Link, and Markdown Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Ruff
        run: just dev lint python

      - name: Ty
        run: just dev lint type

      - name: Taplo
        run: just dev lint toml

      - name: Lychee
        run: just dev lint links

      - name: pymarkdown
        run: just dev lint markdown

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Run tests
        run: just dev test python

  broad-tests:
    name: broad (${{ matrix.os }})
    # The required "Tests" gate above is marker-scoped to `unit`, which hides the
    # much larger integration/behavioural suite. This job runs the full suite
    # (excluding only the gemini/claude markers, which need external API
    # credentials) on BOTH Linux and Windows, so a green CI no longer implies
    # "every test passed" when only the unit slice ran on a single OS - and so
    # platform-specific test hardcodes are caught automatically. Both hosted
    # runners are symlink-capable, so the symlink-requiring filesystem tests run
    # in full. This is a required status check on both legs: a failure on either
    # OS blocks the merge, so "green" means green on every platform.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        # bash is available on windows-latest via Git Bash; using it on both
        # OSes keeps the just invocation and argument quoting identical.
        shell: bash
        run: just dev deps sync

      - name: Run broad test suite
        shell: bash
        run: uv run pytest src/vaultspec_core -q -m "not gemini and not claude and not network"

  windows-vault-repair:
    name: Windows Vault Repair Tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Run vault repair regression tests
        run: uv run pytest src/vaultspec_core/tests/cli/test_vault_repair.py src/vaultspec_core/vaultcore/checks/tests/test_structure_case_rename.py -q

  vault-audit:
    name: Vault Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Bootstrap framework
        # The source repo tracks .vaultspec/ framework config, but the install
        # manifest (.vaultspec/providers.json) stays gitignored. A fresh
        # checkout therefore has the framework dir without a manifest, which
        # the diagnosis engine classifies as CORRUPTED. Run install with
        # --force to repair/create the manifest from the tracked config and
        # scaffold provider outputs, the way a consumer recovering a missing
        # manifest would.
        run: just prod install --force

      - name: Verify vault structure and links
        run: just prod vault check all

  dependency-audit:
    name: Dependency Audit (uv audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Python dependency vulnerability audit
        run: just dev audit deps

# Consolidated hooks (scaffolded by default)
#
# vault-fix: runs all vault checkers with --fix, auto-repairing safe
# ongoing-hygiene issues (naming, frontmatter, links, dangling,
# references) and blocking on remaining errors (body-links). Schema
# migrations are NOT performed by this hook - they are owned by the
# vaultspec_core.migrations registry, which runs once per upgrade (or
# lazily on the first vault command after an upgrade) and never
# re-runs. Use 'vaultspec-core migrations status' / 'migrations run'
# for explicit control.
#
# spec-check: runs the workspace doctor, diagnosing framework, provider,
# and tooling health.

- id: vault-fix
  name: Vault fix
  entry: uv run --no-sync vaultspec-core vault check all --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: check-provider-artifacts
  name: Check provider artifacts
  entry: uv run --no-sync vaultspec-core check-providers
  language: system
  always_run: true
  pass_filenames: false

- id: spec-check
  name: Spec check
  entry: uv run --no-sync vaultspec-core spec doctor
  language: system
  types: [markdown]
  pass_filenames: false

# Granular hooks for consumer projects that need fine-grained control.
# Each fix-* hook auto-repairs its domain; check-* hooks validate only.

- id: fix-naming
  name: Fix vault naming
  entry: uv run --no-sync vaultspec-core vault check structure --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: fix-frontmatter
  name: Fix vault frontmatter
  entry: uv run --no-sync vaultspec-core vault check frontmatter --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: fix-links
  name: Fix vault links
  entry: uv run --no-sync vaultspec-core vault check links --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: fix-dangling
  name: Fix dangling references
  entry: uv run --no-sync vaultspec-core vault check dangling --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: fix-references
  name: Fix missing references
  entry: uv run --no-sync vaultspec-core vault check references --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: fix-schema
  name: Fix schema compliance
  entry: uv run --no-sync vaultspec-core vault check schema --fix
  language: system
  types: [markdown]
  pass_filenames: false

- id: check-body-links
  name: Check body links
  entry: uv run --no-sync vaultspec-core vault check body-links
  language: system
  types: [markdown]
  pass_filenames: false

- id: check-orphans
  name: Check orphaned documents
  entry: uv run --no-sync vaultspec-core vault check orphans
  language: system
  types: [markdown]
  pass_filenames: false

- id: check-features
  name: Check feature completeness
  entry: uv run --no-sync vaultspec-core vault check features
  language: system
  types: [markdown]
  pass_filenames: false
